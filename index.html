<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Reader Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
        .hidden { display: none; }
        .loading-spinner { border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-8 font-sans">
    <header class="flex justify-between items-center mb-6 max-w-2xl mx-auto w-full">
        <h1 class="text-2xl font-bold text-sky-400">📖 AI Reader</h1>
        <div id="status-badge" class="text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-400">Ready</div>
    </header>

    <main id="app-container" class="flex-1 flex flex-col gap-6 max-w-2xl mx-auto w-full">
        <!-- Import Area -->
        <div id="import-section" class="bg-slate-800 p-8 rounded-2xl border border-slate-700 text-center flex flex-col items-center gap-4">
            <div id="spinner" class="hidden loading-spinner"></div>
            <p id="instruction-text" class="text-slate-400">Import a PDF to start listening.</p>
            <label class="cursor-pointer bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 px-8 rounded-xl transition">
                + Import Document
                <input type="file" id="upload" accept=".pdf" class="hidden">
            </label>
        </div>

        <!-- Controls Area -->
        <div id="controls-section" class="hidden bg-slate-800 p-6 rounded-2xl border border-slate-700 flex flex-col gap-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-slate-400 uppercase tracking-widest">Select Voice</label>
                    <select id="voice-select" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm mt-1 text-white"></select>
                </div>
                <div>
                    <label class="text-xs text-slate-400 uppercase tracking-widest">Speed (<span id="rate-val">0.9</span>x)</label>
                    <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="0.9" class="w-full mt-2 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <div class="flex gap-2">
                <button id="play" class="flex-[2] bg-sky-600 hover:bg-sky-500 py-3 rounded-xl font-bold transition">Play</button>
                <button id="pause" class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-bold transition">Pause</button>
                <button id="stop" class="flex-1 bg-red-900/50 hover:bg-red-900 py-3 rounded-xl font-bold transition">Stop</button>
            </div>
            
            <div class="flex justify-between items-center text-sm text-slate-400">
                <button id="prev-page" class="hover:text-white px-2 py-1">Previous</button>
                <span id="page-indicator">Page 1 / 0</span>
                <button id="next-page" class="hover:text-white px-2 py-1">Next</button>
            </div>
        </div>

        <!-- Reader Display -->
        <div id="viewer" class="hidden flex-1 overflow-y-auto bg-slate-950 p-6 rounded-2xl border border-slate-800 text-slate-300 leading-relaxed min-h-[300px]">
            <div id="output" class="whitespace-pre-wrap text-lg"></div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdf = null;
        let currentPage = 1;
        let pagesText = [];
        let isSpeaking = false;
        let utterance = null;
        
        const synth = window.speechSynthesis;
        const rateInput = document.getElementById('rate');
        const rateVal = document.getElementById('rate-val');
        const voiceSelect = document.getElementById('voice-select');
        const statusBadge = document.getElementById('status-badge');

        rateInput.oninput = (e) => rateVal.textContent = parseFloat(e.target.value).toFixed(1);

        function updateStatus(msg, color = 'bg-slate-800') {
            statusBadge.textContent = msg;
            statusBadge.className = `text-xs px-3 py-1 rounded-full ${color} text-white`;
        }

        // Load human-sounding voices
        async function loadVoices() {
            const voices = synth.getVoices();
            voiceSelect.innerHTML = '';
            
            // Try to prefer high-quality Google voices if available
            voices.sort((a, b) => (b.name.includes('Google') ? 1 : 0) - (a.name.includes('Google') ? 1 : 0));
            
            voices.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.name;
                // Identify gender/type by name string for better labeling
                const type = v.name.toLowerCase().includes('female') ? 'Female' : 
                             v.name.toLowerCase().includes('male') ? 'Male' : 'Neutral';
                opt.textContent = `${v.name} (${type})`;
                if (v.default) opt.selected = true;
                voiceSelect.appendChild(opt);
            });
        }

        // Wait for voices to load
        speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        // PDF Processing logic
        document.getElementById('upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('spinner').classList.remove('hidden');
            document.getElementById('instruction-text').textContent = "Extracting text structure...";

            try {
                const buffer = await file.arrayBuffer();
                pdf = await pdfjsLib.getDocument(buffer).promise;
                pagesText = [];
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    // Basic text extraction logic
                    pagesText.push(content.items.map(item => item.str).join(" "));
                }

                document.getElementById('import-section').classList.add('hidden');
                document.getElementById('controls-section').classList.remove('hidden');
                document.getElementById('viewer').classList.remove('hidden');
                renderPage(1);
                document.getElementById('spinner').classList.add('hidden');
            } catch (err) {
                alert("Failed to process document. It might be an image-only PDF.");
                document.getElementById('spinner').classList.add('hidden');
            }
        };

        function renderPage(p) {
            currentPage = p;
            document.getElementById('output').textContent = pagesText[p - 1];
            document.getElementById('page-indicator').textContent = `Page ${p} / ${pdf.numPages}`;
            updateStatus("Ready");
        }

        document.getElementById('prev-page').onclick = () => { if(currentPage > 1) renderPage(currentPage - 1); };
        document.getElementById('next-page').onclick = () => { if(currentPage < pdf.numPages) renderPage(currentPage + 1); };

        // Playback logic
        function speakPage(text) {
            synth.cancel();
            
            // Chunk by sentence-like structures (punctuation)
            const chunks = text.match(/[^.!?]+[.!?]+/g) || [text];
            let chunkIndex = 0;

            function playChunk() {
                if (chunkIndex >= chunks.length) {
                    isSpeaking = false;
                    updateStatus("Ready");
                    return;
                }

                utterance = new SpeechSynthesisUtterance(chunks[chunkIndex]);
                utterance.rate = parseFloat(rateInput.value);
                utterance.voice = synth.getVoices().find(v => v.name === voiceSelect.value);
                
                utterance.onstart = () => { isSpeaking = true; updateStatus("Playing...", "bg-green-600"); };
                utterance.onend = () => { chunkIndex++; playChunk(); };
                utterance.onerror = () => { isSpeaking = false; updateStatus("Error", "bg-red-600"); };
                
                synth.speak(utterance);
            }
            
            playChunk();
        }

        document.getElementById('play').onclick = () => {
            if (synth.speaking && synth.paused) { synth.resume(); return; }
            if (isSpeaking) return;
            if (pagesText[currentPage - 1]) speakPage(pagesText[currentPage - 1]);
        };

        document.getElementById('pause').onclick = () => synth.pause();
        document.getElementById('stop').onclick = () => { synth.cancel(); isSpeaking = false; updateStatus("Ready"); };
        
        // PWA Manifest generator (dynamically injected for installability)
        const manifest = {
            "name": "AI Reader",
            "short_name": "AI Reader",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0f172a",
            "theme_color": "#0f172a",
            "icons": [{ "src": "https://placehold.co/192x192/0f172a/sky-400?text=AI", "sizes": "192x192", "type": "image/png" }]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.querySelector('link[rel="manifest"]').href = manifestURL;
    </script>
</body>
</html>
